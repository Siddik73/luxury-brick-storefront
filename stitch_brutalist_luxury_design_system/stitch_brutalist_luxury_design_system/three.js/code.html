<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_22 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_22" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_22');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
// The Monolith - Interactive 3D Brick Scene
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xD83528, 50); // Ember Red
spotLight.position.set(5, 5, 5);
spotLight.castShadow = true;
scene.add(spotLight);

const pointLight = new THREE.PointLight(0xffffff, 10);
pointLight.position.set(-5, -2, 2);
scene.add(pointLight);

// Geometry: The Monolith Brick
const geometry = new THREE.BoxGeometry(2, 1, 1);
const material = new THREE.MeshPhongMaterial({ 
    color: 0xD83528, // Ember Red
    specular: 0x111111,
    shininess: 30,
    flatShading: true
});
const brick = new THREE.Mesh(geometry, material);
scene.add(brick);

// Interaction State
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };

container.addEventListener('mousedown', (e) => { isDragging = true; });
container.addEventListener('mouseup', (e) => { isDragging = false; });
container.addEventListener('mousemove', (e) => {
    const deltaMove = {
        x: e.offsetX - previousMousePosition.x,
        y: e.offsetY - previousMousePosition.y
    };

    if (isDragging) {
        const deltaRotationQuaternion = new THREE.Quaternion()
            .setFromEuler(new THREE.Euler(
                deltaMove.y * (Math.PI / 180),
                deltaMove.x * (Math.PI / 180),
                0,
                'XYZ'
            ));
        brick.quaternion.multiplyQuaternions(deltaRotationQuaternion, brick.quaternion);
    }
    
    previousMousePosition = { x: e.offsetX, y: e.offsetY };
});

// Reset Functionality (Handled via global trigger from UI)
window.resetBrickView = () => {
    brick.rotation.set(0, 0, 0);
    brick.position.set(0, 0, 0);
};

// Animation Loop
function animate() {
    requestAnimationFrame(animate);
    
    if (!isDragging) {
        brick.rotation.y += 0.005;
        brick.rotation.x += 0.002;
    }
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_22 -->
</body>
</html>
