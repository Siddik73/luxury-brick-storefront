<script>
    // Micro-interaction: Tilt effect on scroll for the hero image
    window.addEventListener('scroll', () => {
      const scrolled = window.pageYOffset;
      const heroImg = document.querySelector('img[src="https://lh3.googleusercontent.com/aida/AP1WRLt-VGx7Vu7Jup9Bw-IlZCXR8bLKfxj6p75c8JckzFmEs5Jo-nKw2ssoDB2-ANI7DS4dxHPj27o2uc54ZkY_GPEQlaZfCm8t6uFZyzPqk5XDBLNjV45h2wRrG8suxzWvR1-O9UPowMRSqjcYhwWje1rSLg5JMLuC6ITcyzaUJA_cWyPlF2l2wWUPiv-Fs7sPsjviogp3l3sQD9BlFeuXSCWaIWwBrKrcPMeiM9vulP7sZgXcg7H8Wrlxe9E"]');
      if (heroImg) {
        heroImg.style.transform = `translateY(${scrolled * -0.1}px) rotate(${scrolled * 0.02}deg)`;
      }
    });

    // Feedback for interactions
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', function() {
        this.classList.add('scale-95');
      });
      btn.addEventListener('touchend', function() {
        this.classList.remove('scale-95');
      });
    });
