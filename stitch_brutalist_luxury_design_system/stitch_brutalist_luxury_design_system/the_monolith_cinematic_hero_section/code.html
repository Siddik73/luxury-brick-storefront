<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>THE MONOLITH | It Is Not A Brick.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;family=JetBrains+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "void-black": "#0A0A0A",
                        "onyx-black": "#161616",
                        "ash-gray": "#8A8A8A",
                        "bone-white": "#F0F0F0",
                        "muted-gold": "#C5A059",
                        "ember-red": "#d83528"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "container-max": "1440px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "display-xl": ["Playfair Display", "serif"],
                        "label-lg": ["Inter", "sans-serif"],
                        "label-md": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "display-xl": ["80px", { "lineHeight": "90px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-xl-mobile": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-lg": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "label-md": ["10px", { "lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0A0A0A;
            color: #F0F0F0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom smooth cursor for interactive feel */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 1px solid #F0F0F0;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            mix-blend-mode: difference;
        }
        /* Chiaroscuro light effect */
        .light-shaft {
            position: absolute;
            top: -10%;
            left: 50%;
            width: 1px;
            height: 120%;
            background: linear-gradient(180deg, transparent 0%, rgba(240, 240, 240, 0.05) 50%, transparent 100%);
            transform: rotate(15deg);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-void-black text-bone-white font-label-lg">
<!-- Subtle atmospheric light shaft -->
<div class="light-shaft"></div>
<div class="custom-cursor hidden md:block" id="cursor"></div>
<!-- TopNavBar (The Monolith Navigation Shell) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-8 max-w-container-max mx-auto border-b border-ash-gray/20">
<!-- Identity / Status -->
<div class="flex flex-col gap-1">
<span class="font-mono text-ash-gray text-[10px] tracking-widest">01 / 03</span>
<span class="text-bone-white font-bold tracking-tighter text-xl md:text-2xl">THE MONOLITH</span>
</div>
<!-- Navigation Links -->
<nav class="hidden md:flex items-center gap-12">
<a class="text-bone-white border-b border-bone-white pb-1 transition-all duration-300" href="#">THE OBJECT</a>
<a class="text-ash-gray hover:text-bone-white transition-colors duration-300" href="#">PROVENANCE</a>
<a class="text-ash-gray hover:text-bone-white transition-colors duration-300" href="#">ACQUIRE</a>
</nav>
<!-- Secondary Identity -->
<div class="text-right">
<p class="font-label-lg tracking-[0.2em] text-ash-gray text-[10px]">ATELIER MONOLITH</p>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative h-screen w-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Interactive 3D Placeholder Area -->
<div class="relative w-full max-w-[1100px] aspect-video z-10 flex items-center justify-center group cursor-crosshair">
<div class="absolute inset-0 border border-ash-gray/10 group-hover:border-ash-gray/30 transition-colors duration-700"></div>
<!-- This represents the interactive 3D space -->
<div class="relative w-full h-full flex items-center justify-center overflow-hidden">
<!-- Visual Placeholder for the "Floating Brick" -->
<div class="relative w-1/3 h-1/2 bg-onyx-black border border-ash-gray/40 shadow-[0_0_100px_rgba(240,240,240,0.03)] transform rotate-12 transition-transform duration-[2000ms] ease-out group-hover:rotate-0 flex items-center justify-center">
<!-- Subtle texture/grain can be added via CSS or image -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');"></div>
<!-- Emblem -->
<div class="border border-ash-gray/20 p-4">
<span class="material-symbols-outlined text-ash-gray opacity-40 scale-150">architecture</span>
</div>
<!-- Label on the object -->
<div class="absolute bottom-4 left-4">
<span class="font-mono text-[8px] text-ash-gray uppercase tracking-widest">Serial: M-0101</span>
</div>
</div>
<!-- Three.js or WebGL Shader Placeholder -->

</div>
<!-- Interactivity Hint -->
<div class="absolute bottom-8 right-8 flex items-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
<span class="font-mono text-[10px] text-ash-gray">DRAG TO ROTATE</span>
<div class="w-8 h-[1px] bg-ash-gray"></div>
</div>
</div>
<!-- Headline & Typography Cluster -->
<div class="absolute bottom-[102px] left-0 w-full px-margin-mobile md:px-margin-desktop z-20 flex flex-col items-center">
<div class="text-center">
<h1 class="font-display-xl text-display-xl-mobile md:text-display-xl text-bone-white mb-2">
                    It Is Not A Brick.
                </h1>
<!-- Muted Gold Line -->
<div class="w-48 h-[1px] bg-muted-gold mx-auto mb-4"></div>
<p class="font-label-lg tracking-[0.4em] text-ash-gray uppercase text-[12px] md:text-[14px]">
                    It is a foundation.
                </p>
</div>
</div>
<!-- Meta Data / Caption Cluster -->
<div class="absolute bottom-8 left-margin-mobile md:left-margin-desktop z-20">
<p class="font-mono text-ash-gray text-[10px] tracking-widest">
                EST. 1890 — HAND-FIRED
            </p>
</div>
<!-- Vertical Scroll Indicator -->
<div class="absolute bottom-8 right-margin-mobile md:right-margin-desktop z-20 flex flex-col items-center gap-4">
<div class="w-[1px] h-12 bg-gradient-to-b from-bone-white to-transparent"></div>
<span class="font-mono text-[10px] text-bone-white [writing-mode:vertical-rl] tracking-widest">SCROLL</span>
</div>
</main>
<!-- Footer Identity (Minimized for Hero) -->
<footer class="fixed bottom-0 left-0 w-full px-margin-mobile md:px-margin-desktop py-4 flex justify-between items-end pointer-events-none opacity-40">
<!-- Content handled by the positioned elements in main for this cinematic layout -->
</footer>
<script>
        // Custom cursor logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Hover effect for the 3D placeholder
        const container = document.querySelector('.group');
        const brick = container.querySelector('.bg-onyx-black');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            
            // Subtle parallax/rotation based on mouse
            brick.style.transform = `perspective(1000px) rotateY(${x * 20}deg) rotateX(${y * -20}deg) translateZ(50px)`;
        });

        container.addEventListener('mouseleave', () => {
            brick.style.transform = 'perspective(1000px) rotateY(12deg) rotateX(0deg) translateZ(0)';
        });
    </script>
</body></html>
